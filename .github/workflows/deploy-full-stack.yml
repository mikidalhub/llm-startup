name: One-shot deploy FE + BE (GitHub-centric)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: full-stack-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
      NEXT_PUBLIC_API_ORIGIN: ${{ vars.NEXT_PUBLIC_API_ORIGIN }}
    environment:
      name: github-pages
      url: ${{ steps.pages_deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required GitHub variables
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_API_ORIGIN:-}" ]; then
            echo "Missing repository variable NEXT_PUBLIC_API_ORIGIN"
            echo "Set it to your backend public URL (for example https://my-backend.onrender.com)."
            exit 1
          fi
          echo "NEXT_PUBLIC_API_ORIGIN is configured."

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build frontend static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

      - name: Deploy frontend to GitHub Pages
        id: pages_deploy
        uses: actions/deploy-pages@v5

      - name: Set backend image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${GITHUB_EVENT_REPOSITORY_NAME}-backend" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Trigger Render deploy (optional)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Railway deploy (optional)
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"

      - name: Trigger Fly.io deploy webhook (optional)
        if: ${{ secrets.FLY_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.FLY_DEPLOY_HOOK_URL }}"
