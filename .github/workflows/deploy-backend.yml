name: Deploy backend (GitHub-only)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-ghcr
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
      FLY_DEPLOY_HOOK_URL: ${{ secrets.FLY_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set backend image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${GITHUB_EVENT_REPOSITORY_NAME}-backend" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" -t "$IMAGE_NAME:latest" .

      - name: Push backend image
        run: |
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"

      - name: Trigger optional provider deploy hooks
        run: |
          set -euo pipefail
          if [ -n "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"
          fi
          if [ -n "${RAILWAY_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${RAILWAY_DEPLOY_HOOK_URL}"
          fi
          if [ -n "${FLY_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${FLY_DEPLOY_HOOK_URL}"
          fi
