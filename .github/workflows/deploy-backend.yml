name: Deploy backend (GitHub-only)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-ghcr
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
      FLY_DEPLOY_HOOK_URL: ${{ secrets.FLY_DEPLOY_HOOK_URL }}
      NEXT_PUBLIC_API_ORIGIN_VAR: ${{ vars.NEXT_PUBLIC_API_ORIGIN }}
      NEXT_PUBLIC_API_ORIGIN_SECRET: ${{ secrets.NEXT_PUBLIC_API_ORIGIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set backend image name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${REPO_NAME}-backend" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" -t "$IMAGE_NAME:latest" .

      - name: Push backend image
        run: |
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"

      - name: Trigger optional provider deploy hooks
        run: |
          set -euo pipefail
          if [ -n "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"
          fi
          if [ -n "${RAILWAY_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${RAILWAY_DEPLOY_HOOK_URL}"
          fi
          if [ -n "${FLY_DEPLOY_HOOK_URL:-}" ]; then
            curl -fsSL -X POST "${FLY_DEPLOY_HOOK_URL}"
          fi

      - name: Verify backend health endpoint
        run: |
          set -euo pipefail
          BACKEND_ORIGIN="${NEXT_PUBLIC_API_ORIGIN_VAR:-}"
          if [ -z "$BACKEND_ORIGIN" ]; then
            BACKEND_ORIGIN="${NEXT_PUBLIC_API_ORIGIN_SECRET:-}"
          fi
          if [ -z "${BACKEND_ORIGIN:-}" ]; then
            echo "Cannot verify backend health: NEXT_PUBLIC_API_ORIGIN is not configured."
            echo "Set repository variable or secret NEXT_PUBLIC_API_ORIGIN to your backend base URL."
            exit 1
          fi
          BACKEND_ORIGIN="${BACKEND_ORIGIN%/}"
          HEALTH_URL="${BACKEND_ORIGIN}/api/health"
          echo "Checking ${HEALTH_URL}"

          success=false
          for attempt in $(seq 1 20); do
            if curl -fsS "$HEALTH_URL" | grep -q '"status":"ok"'; then
              success=true
              break
            fi
            echo "Backend not healthy yet (attempt ${attempt}/20). Retrying in 15s..."
            sleep 15
          done

          if [ "$success" != "true" ]; then
            echo "Backend health check failed for ${HEALTH_URL}"
            exit 1
          fi
