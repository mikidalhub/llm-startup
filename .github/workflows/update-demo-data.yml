name: Refresh demo data

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh static JSON snapshots
        run: npm run data:refresh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/dashboard.json public/data/kpis.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh static demo data"
          git push
